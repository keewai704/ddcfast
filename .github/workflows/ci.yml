name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libddcutil-dev pkg-config

      - name: Validate helper scripts
        run: |
          bash -n \
            scripts/version.sh \
            scripts/stage-system.sh \
            scripts/build-deb.sh \
            scripts/build-arch-package.sh

      - name: Build Go binary
        run: go build ./...

      - name: Build Debian package
        run: ./scripts/build-deb.sh

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: ddcfast-deb
          path: dist/*.deb

  arch-package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install packaging dependencies
        run: |
          set -eu
          missing=""
          for pkg in git go ddcutil pkgconf; do
            if ! pacman -Q "$pkg" >/dev/null 2>&1; then
              missing="$missing $pkg"
            fi
          done
          if [ -n "$missing" ]; then
            pacman -Syu --noconfirm $missing
          fi

      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
          su builder -c './scripts/build-arch-package.sh'

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: ddcfast-arch
          path: dist/*.pkg.tar.*

  nix:
    runs-on: ubuntu-latest
    steps:
      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        run: |
          curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon

      - name: Build Nix package
        run: |
          . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          nix --extra-experimental-features 'nix-command flakes' build .#ddcfast
