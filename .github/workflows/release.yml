name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version-file: go.mod

      - name: Install native dependencies
        run: sudo apt-get update && sudo apt-get install -y libddcutil-dev pkg-config

      - name: Build Debian package
        run: VERSION="${GITHUB_REF_NAME#v}" ./scripts/build-deb.sh

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: deb
          path: dist/*.deb

  build-arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install packaging dependencies
        run: pacman -Syu --noconfirm --needed git go ddcutil pkgconf

      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder:builder "$PWD"
          su builder -c "VERSION=\"${GITHUB_REF_NAME#v}\" ./scripts/build-arch-package.sh"

      - uses: actions/upload-artifact@v7.0.0
        with:
          name: arch
          path: dist/*.pkg.tar.*

  nix:
    runs-on: ubuntu-latest
    steps:
      - name: Set git defaults
        run: git config --global init.defaultBranch main

      - uses: actions/checkout@v6.0.2

      - name: Install Nix
        run: |
          curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon

      - name: Build Nix package
        run: |
          . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          nix --extra-experimental-features 'nix-command flakes' build .#ddcfast

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-arch
      - nix
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: release-artifacts

      - uses: softprops/action-gh-release@v2.5.3
        with:
          files: |
            release-artifacts/**/*.deb
            release-artifacts/**/*.pkg.tar.*
